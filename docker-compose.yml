services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  analyzer:
    build: ./analyzer
    image: presidio-analyzer-sv:latest
    container_name: presidio-analyzer-sv
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.analyzer.rule=Host(`${DOMAIN}`) && PathPrefix(`/analyzer`)"
      - "traefik.http.routers.analyzer.entrypoints=websecure"
      - "traefik.http.routers.analyzer.tls.certresolver=le"
      - "traefik.http.routers.analyzer.middlewares=analyzer-stripprefix"
      - "traefik.http.middlewares.analyzer-stripprefix.stripprefix.prefixes=/analyzer"
      - "traefik.http.services.analyzer.loadbalancer.server.port=3000"

  anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    container_name: presidio-anonymizer
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.anonymizer.rule=Host(`${DOMAIN}`) && PathPrefix(`/anonymizer`)"
      - "traefik.http.routers.anonymizer.entrypoints=websecure"
      - "traefik.http.routers.anonymizer.tls.certresolver=le"
      - "traefik.http.routers.anonymizer.middlewares=anonymizer-stripprefix"
      - "traefik.http.middlewares.anonymizer-stripprefix.stripprefix.prefixes=/anonymizer"
      - "traefik.http.services.anonymizer.loadbalancer.server.port=3000"
